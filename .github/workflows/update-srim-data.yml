name: Update S-RIM data

on:
  schedule:
    # Runs every day at 20:30 KST. GitHub cron uses UTC, so this is 11:30 UTC.
    - cron: "30 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-srim-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh latest market data
        run: |
          python scripts/update_market_data.py
          python scripts/update_us_market_data.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/us_latest.json
          git diff --cached --quiet || git commit -m "Update S-RIM latest data"
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
