name: Update S-RIM data

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-srim-data.yml"
      - "scripts/**"
  schedule:
    # Primary daily run at 20:30 KST. GitHub cron uses UTC, so this is 11:30 UTC.
    - cron: "30 11 * * *"
    # Fixed retry windows. They crawl only when today's JSON is still stale.
    - cron: "10 12 * * *"
    - cron: "50 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-srim-data
  cancel-in-progress: false

jobs:
  update:
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide whether fresh data is needed
        id: freshness
        run: python scripts/check_data_freshness.py decide

      - name: Refresh latest market data
        if: steps.freshness.outputs.needs_update == 'true'
        run: |
          python scripts/update_market_data.py
          python scripts/update_us_market_data.py

      - name: Validate refreshed data
        if: steps.freshness.outputs.needs_update == 'true'
        run: python scripts/check_data_freshness.py validate

      - name: Commit changes
        if: steps.freshness.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/us_latest.json
          git diff --cached --quiet || git commit -m "Update S-RIM latest data"
          git push

      - name: Configure Pages
        if: steps.freshness.outputs.needs_update == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.freshness.outputs.needs_update == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.freshness.outputs.needs_update == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
